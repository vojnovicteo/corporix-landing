<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://corporix.ai/">

  <!-- Open Graph -->
  <meta property="og:title" content="Corporix — AI Chatbots for Your Business">
  <meta property="og:description" content="Create powerful external and internal chatbots for your company. Corporix makes enterprise AI accessible.">
  <meta property="og:url" content="https://corporix.ai/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Corporix">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Corporix — AI Chatbots for Your Business">
  <meta name="twitter:description" content="Create powerful external and internal chatbots for your company. Corporix makes enterprise AI accessible.">

  <!-- Favicon (inline SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230c0c0c'/><text x='50' y='72' font-size='64' font-family='system-ui' font-weight='700' fill='%23E7E7E7' text-anchor='middle'>C</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap">
  <link rel="preconnect" href="https://formspree.io">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <span class="pill"><span data-text="Coming Soon">Coming Soon</span></span>
    <img src="/logo.svg" alt="Corporix AI" class="logo">

    <div class="form-card">
      <form id="lead-form" action="https://formspree.io/f/mdapdyyk" method="POST">
        <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">
        <input type="hidden" name="_subject" value="New lead from corporix.ai">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
          <span class="field-error" id="name-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required>
          <span class="field-error" id="email-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn-submit">Join the Waitlist</button>
        <p class="form-disclaimer">By submitting this form you agree to be notified for updates on Corporix.</p>
      </form>
      <div id="form-status" aria-live="polite"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Corporix. All rights reserved.</p>
  </footer>

  <script src="/main.js"></script>
</body>
</html>
